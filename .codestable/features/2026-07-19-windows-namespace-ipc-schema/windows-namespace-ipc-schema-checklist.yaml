feature: 2026-07-19-windows-namespace-ipc-schema
created: 2026-07-19

steps:
  - action: "schema contract：定义 canonical namespace fields、MuxNamespaceRef 投影与 legacy alias 关系，明确 namespace_ipc_kind / namespace_ipc_ref 映射"
    exit_signal: "design/checklist 都能列出 canonical/alias 键、namespace_id==project_id、namespace_backend_family 固定值、plain tmux_* payload 禁入规则，并可机械核对 mapping 规则"
    status: done
  - action: "state/event roundtrip：让 ProjectNamespaceState / ProjectNamespaceEvent 读写 canonical + alias，旧记录可恢复新字段，新记录继续保留旧字段"
    exit_signal: "旧 fixture 与新 fixture roundtrip tests 通过，且 state summary 可投影完整 MuxNamespaceRef"
    status: done
  - action: "ping/doctor payload：build_ccbd_payload、doctor_summary、doctor renderer 输出 canonical 和 alias"
    exit_signal: "payload/render tests 可断言两套字段同时存在，且用不同 sentinel 证明顶层 tmux_socket_path 不被 namespace alias 覆盖"
    status: done
  - action: "foreground attach input compatibility：attach_started_project_namespace 先读 canonical，再回退 legacy，attach 行为不改"
    exit_signal: "attach tests 仍通过，且 canonical payload fixture 也可驱动同一路径"
    status: done
  - action: "compatibility regression：补齐旧字段 / 新字段 / 混合字段回归，确保 ccbd / doctor / start / foreground 不漂移"
    exit_signal: "所有 schema regression tests 通过，包含 canonical-first、alias-fallback、no-clobber 和 MuxNamespaceRef projection"
    status: done

checks:
  - item: "canonical namespace fields 包含 namespace_id、namespace_backend_family、namespace_backend_impl、namespace_session_name、namespace_ipc_kind、namespace_ipc_ref"
    source: roadmap §4.3 + MuxBackend contract
    status: done
  - item: "namespace_id 固定等于 project_id（项目路径哈希身份），旧记录从 record/payload 的 project_id 恢复"
    source: design review FDR-001
    status: done
  - item: "namespace_backend_family 固定为 tmux-family，并能投影到 MuxNamespaceRef.backend_family"
    source: design review FDR-001
    status: done
  - item: "旧 namespace_tmux_socket_path / namespace_tmux_session_name 作为兼容 alias 保留"
    source: roadmap §4.3
    status: done
  - item: "plain tmux_socket_path / tmux_session_name 只作为 state/event record 兼容字段，不作为 namespace alias 展开到顶层 ping/doctor payload"
    source: design review FDR-002
    status: done
  - item: "build_ccbd_payload / doctor ccbd summary 在展开 namespace_summary / namespace_event_summary 前过滤 reserved keys"
    source: design review FDR-002
    status: done
  - item: "顶层 ping/doctor payload 中现有 tmux_socket_path 继续表示 ccbd tmux socket placement，不被 namespace_summary 覆盖"
    source: design review FDR-002
    status: done
  - item: "canonical payload 可机械投影为 MuxNamespaceRef：backend_family、backend_impl、namespace_id、session_name、ipc_kind、ipc_ref，其中 namespace_id == project_id"
    source: MuxBackend contract + 验收契约 AC-007
    status: done
  - item: "ProjectNamespaceState / ProjectNamespaceEvent 可从旧 tmux 记录无损恢复 canonical fields"
    source: 验收契约 AC-001
    status: done
  - item: "to_record / summary_fields / ping payload / doctor payload 同时输出 canonical 与适用层级的 legacy keys"
    source: 验收契约 AC-002、AC-003、AC-004
    status: done
  - item: "foreground attach 输入在 namespace_backend_impl=tmux 时优先 canonical，再回退 legacy，attach 命令行为不变"
    source: 验收契约 AC-005
    status: done
  - item: "不把 tmux attach-session 改成 MuxBackend.attach_namespace()"
    source: 明确不做
    status: done
  - item: "不引入 named pipe 真连接、ACL、job object 或 process liveness 逻辑"
    source: 明确不做
    status: done
  - item: "旧 state/event fixtures 继续可恢复，现有 tmux 测试不回退"
    source: 验收契约 AC-006
    status: done
  - item: "ccbd 仍然是 namespace authority，canonical schema 只是命名与投影，不改 authority 边界"
    source: roadmap §4.3
    status: done

dod:
  commands:
    - id: CMD-001
      command: "python \".codestable/tools/validate-yaml.py\" --file \".codestable/features/2026-07-19-windows-namespace-ipc-schema/windows-namespace-ipc-schema-checklist.yaml\" --yaml-only"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "python \".codestable/tools/validate-yaml.py\" --file \".codestable/roadmap/windows-rmux-native-backend/windows-rmux-native-backend-items.yaml\""
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "python -m pytest -q test/test_v2_project_namespace_state.py"
      core: true
      failure_handling: fix-or-block
      covers:
    - state_event_roundtrip
    - mux_namespace_ref_projection
    - record_alias_compatibility
    - id: CMD-004
      command: "python -m pytest -q test/test_v2_ccbd_socket.py test/test_v2_start_foreground.py test/test_v2_tmux_cleanup_history.py -k \"namespace or ping or doctor or attach\""
      core: true
      failure_handling: fix-or-block
      covers:
        - ping_payload_dual_schema
        - doctor_payload_dual_schema
        - foreground_attach_canonical_first
        - legacy_alias_fallback
        - top_level_tmux_socket_path_no_clobber_with_distinct_sentinels
    - id: CMD-005
      command: "python -m pytest -q test/test_v2_cli_render.py test/test_ccbd_project_view.py -k \"namespace_tmux or namespace_ or tmux_socket_path\""
      core: false
      failure_handling: document-baseline
      covers:
        - doctor_render_dual_schema
        - project_view_namespace_compatibility
        - mixed_fixture_regression
        - top_level_tmux_socket_path_no_clobber_with_distinct_sentinels
  evidence_required:
    - state_roundtrip_tests
    - mux_namespace_ref_projection_tests
    - ping_payload_tests
    - ping_payload_no_clobber_tests
    - doctor_render_tests
    - doctor_payload_no_clobber_tests
    - reserved_key_filter_tests
    - foreground_attach_compat_tests
    - mixed_fixture_regression
    - items_yaml_diff
  cleanliness:
    debug_output: forbidden
    temporary_todo: forbidden
    commented_code: forbidden
    dead_imports: forbidden
    capability_artifact_payload_copy: forbidden
    transport_implementation: forbidden
