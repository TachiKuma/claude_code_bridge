feature: 2026-07-19-tmux-backend-contract-adapter
created: 2026-07-19

steps:
  - action: "implementation admission gate：确认 mux-backend-contract item 已 done，contract module、fake backend、MuxCommandError、capability protocols 可导入；未满足则阻塞实现"
    exit_signal: "admission check 有 yes/no 证据，不通过时不进入 adapter 实现"
    status: done
  - action: "adapter shell：实现 TmuxMuxBackendAdapter 与 ref/capability helpers，backend_impl=tmux、ipc evidence 和 old backend 包装可导入"
    exit_signal: "contract import 与 adapter construction 单测通过，capabilities shape 对齐 MuxCapabilities，socket path/name/default 映射均可断言"
    status: done
  - action: "error mapping：集中实现 TmuxCommandError、transient、returncode 到 MuxCommandError 的映射，保留 command/socket/detail/stdout/stderr evidence"
    exit_signal: "failure injection tests 覆盖 transient、not-found、permission、unsupported、command-failed、TimeoutExpired、CalledProcessError、FileNotFoundError，category 与 evidence 可断言"
    status: done
  - action: "namespace lifecycle adapter methods：用现有 tmux readiness helpers 和 _tmux_run 实现 prepare/server policy/create/exists/attach/root/destroy"
    exit_signal: "fake tmux runner tests 证明命令顺序与旧 namespace lifecycle 等价，namespace_id/ipc_ref 稳定"
    status: done
  - action: "window layout adapter methods：实现 list/select/ensure/kill/reflow/move/swap，reflow_window 是调用层 canonical seam"
    exit_signal: "layout/reflow tests 通过，调用层不直接拼 select-layout/swap-pane"
    status: done
  - action: "pane/io/presentation/logging adapter methods：复用 TmuxBackend mixin/service 提供 send/capture/respawn/kill/title/user option/style/log methods，并转换 MuxPaneRef"
    exit_signal: "pane ref 到旧 pane_id 的适配测试通过，旧 public methods 仍可直接调用"
    status: done
  - action: "representative caller migration：迁移 layout root、ccbd namespace backend、runtime launch detached pane/server policy、agent window reflow 到 mux-facing seam；foreground attach、provider-specific launcher/session runtime、project clear、materialize topology 等剩余泄漏点更新 inventory"
    exit_signal: "新增代码路径不直接新增 _tmux_run 调用，旧抽样测试仍通过，inventory 点名未迁移项"
    status: done
  - action: "regression and guard tests：补 adapter contract tests、namespace/layout/runtime launch 抽样回归，以及 _tmux_run public leakage guard"
    exit_signal: "CMD-003、CMD-004、CMD-005 通过或记录既有基线红灯"
    status: done

