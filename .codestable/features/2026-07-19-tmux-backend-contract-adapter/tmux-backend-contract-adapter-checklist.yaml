      command: "python -m pytest -q test/test_tmux_mux_backend_adapter.py"
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "python -m pytest -q test/test_agent_window_reflow.py test/test_cli_runtime_launch_tmux_panes.py test/test_ccbd_project_clear.py"
      core: true
      failure_handling: fix-or-block
