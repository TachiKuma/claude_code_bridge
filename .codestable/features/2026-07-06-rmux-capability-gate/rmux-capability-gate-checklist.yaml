feature: 2026-07-06-rmux-capability-gate
created: 2026-07-06

steps:
  - action: "schema 骨架：定义 probe 输入、capability report 输出、status 枚举和 blocking gap 推导"
    exit_signal: "fake result 能生成合法 report，且 required unsupported / workaround.accepted != true 会进入带 degrade_impact / consequence 的 blocking_gaps"
    status: done
  - action: "命令 probe 编排：建立 roadmap command catalog 和逐项执行、记录、归档机制"
    exit_signal: "单元测试证明 command status、required flag、evidence 路径和失败分类可预测"
    status: done
  - action: "语义 probe 编排：建立 session、namespace、attach、layout、pane identity、send、death、cleanup 场景记录"
    exit_signal: "fake runner 覆盖 supported、partial、unsupported、workaround 四类 semantic result"
    status: done
  - action: "capture fidelity：加入 provider completion 相关 golden 比较维度"
    exit_signal: "测试覆盖尾部空白、CSI/OSC/非 CSI 转义、wrapping、宽字符、last-N 截断至少一组通过和一组失败；失败样例至少一个落在 wrapping、宽字符、OSC / 非 CSI 转义，并穿过 Codex/Claude pane parser"
    status: done
  - action: "artifact/report 输出：接通 CLI 参数、run dir、redaction、artifact index 和 report 写盘"
    exit_signal: "每个 evidence 路径都能从 artifact_index 反查，且 artifact 只含相对路径和已脱敏内容"
    status: done
  - action: "Windows 真机 runbook：接通真实 probe 命令、隔离 namespace、daemon 预状态、cleanup evidence 和 daemon 行为记录"
    exit_signal: "Windows 真机运行 probe 后生成 capability report 和 artifacts，且 preflight 记录 daemon 预状态；无 Windows evidence 时不能进入 route approval"
    status: done
  - action: "验证与回归：补齐 YAML 校验、probe 单测、既有 probe 回归和 Windows evidence 归档说明"
    exit_signal: "必跑命令完成；若 Windows evidence 缺失，明确阻塞 route approval 而不是标记路线通过"
    status: done

checks:
  - item: "CapabilityReport 包含 backend_impl、version、platform、generated_at、probe_status、preflight.daemon_pre_state、commands、semantics、blocking_gaps、artifact_index"
    source: 名词契约
    status: passed
  - item: "Command catalog 覆盖 start-server/new-session/attach-session/has-session/kill-session/kill-server/list-windows/new-window/rename-window/select-window/kill-window/move-pane/resize-pane/select-layout/swap-pane/split-window/list-panes/display-message/set-option/set-window-option/set-hook/bind-key/send-keys/load-buffer/paste-buffer/delete-buffer/capture-pane/pipe-pane/respawn-pane/list-clients/refresh-client"
    source: 名词契约
    status: passed
  - item: "Semantic catalog 覆盖 session survival、namespace isolation、attach/reattach、window policy、layout/reflow、pane id stability、user options/title、capture last N lines、capture format fidelity、buffer paste、Ctrl-C/Ctrl-D、pane death、daemon crash/cleanup evidence、provider/process distinction workaround evidence"
    source: 名词契约
    status: passed
  - item: "partial / workaround 状态必须显式写 workaround: null | {id, description, evidence, accepted}；blocking gap 推导不得读取 notes"
    source: 名词契约
    status: passed
  - item: "每个 command/semantic 必须写 degrade_impact 和 consequence；每个 blocking gap 必须带同样的 degrade 语境"
    source: 名词契约
    status: passed
  - item: "每个 commands.*.evidence / semantics.*.evidence 都必须能在 artifact_index 中按相对路径反查"
    source: 名词契约
    status: passed
  - item: "主流程保持 preflight → isolated namespace → command probes → semantic probes → capture fidelity probes → gap generation → report/artifacts → cleanup"
    source: 编排骨架
    status: passed
  - item: "单项 probe 失败不应中断整个 probe；失败必须结构化写入 report 和 evidence"
    source: 流程级约束
    status: passed
  - item: "stdout/stderr、环境摘要、pane capture、raw logs 写盘前必须 redaction，且不记录完整环境变量"
    source: 流程级约束
    status: passed
  - item: "本 feature 不新增 RmuxBackend production implementation"
    source: 范围守护
    status: passed
  - item: "本 feature 不修改 backend_selection.py 以新增 rmux 选择分支"
    source: 范围守护
    status: passed
  - item: "本 feature 不新增或启用 runtime.mux.backend / CCB_MUX_BACKEND 运行时配置"
    source: 范围守护
    status: passed
  - item: "Capability report 不包含 route_approved=true 或等价字段"
    source: 范围守护
    status: passed
  - item: "Provider completion parser 不因本 feature 被重写；只允许新增或使用 fixture 与比较证据"
    source: 范围守护
    status: passed
  - item: "主链路不把 rmux executable 当作 tmux executable 的透明替换"
    source: 范围守护
    status: passed
  - item: "Probe CLI、probe tests、roadmap drafts/report 产物约定是本 feature 的全部挂载点"
    source: 挂载点
    status: passed
  - item: "Windows 真机 preflight report 记录 platform、Rmux executable、version、shell、run id、daemon 预状态；失败时给出可行动原因"
    source: 验收场景
    status: passed
  - item: "blocking_gaps 可由 required/status/workaround.accepted/evidence 机械推导，并携带 degrade_impact / consequence"
    source: 验收场景
    status: passed
  - item: "capture fidelity evidence 比较尾部空白、CSI/OSC/非 CSI 转义、wrapping、宽字符、last-N 截断，并穿过 consumer-strip 与 direct-stdout 两类 Codex/Claude parser 入口，不只证明 capture-pane 能返回文本"
    source: 验收场景
    status: passed
  - item: "capture fidelity 必须逐维标注归一化责任：CSI 可由 strip_ansi 处理，OSC/非 CSI、wrapping、宽字符不被当前 normalize 吸收，必须靠输出平价或失败样例证明"
    source: 验收场景
    status: passed
  - item: "合成 fixture 单测与 Windows 真机 Rmux artifacts 不可互替，AC-005 必须同时保留两类证据"
    source: 验收场景
    status: passed
  - item: "cleanup evidence 记录 daemon 预状态和本次 session/window/pane 清理结果，daemon 行为只采 evidence 不定义 ownership"
    source: 验收场景
    status: passed

dod:
  commands:
    - id: CMD-001
      command: "python \".codestable/tools/validate-yaml.py\" --file \".codestable/features/2026-07-06-rmux-capability-gate/rmux-capability-gate-checklist.yaml\" --yaml-only"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "python -m pytest -q test/test_rmux_capability_probe.py"
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "python \"scripts/probe_rmux_capability.py\" --work-root \".codestable/roadmap/windows-rmux-native-backend/drafts/rmux-capability-gate\""
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "python -m pytest -q test/test_codex_pane_status_probe.py"
      core: false
      failure_handling: fix-or-block
  evidence_required:
    - command_output
    - capability_report
    - artifact_index
    - artifacts_directory
    - daemon_pre_state_evidence
    - windows_probe_transcript
    - qa_report
    - acceptance_report
    - diff_summary
  cleanliness:
    debug_output: forbidden
    temporary_todo: forbidden
    commented_code: forbidden
    dead_imports: forbidden
    unredacted_secret_artifacts: forbidden
