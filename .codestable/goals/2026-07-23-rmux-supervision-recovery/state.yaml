objective: "将 Rmux pane、provider process/job、namespace 和 daemon health 纳入 ccbd supervision/recovery，并提供可诊断的恢复或降级路径。"
start_point: "ccbd-rmux-namespace-lifecycle 已 accepted；rmux-supervision-recovery design/review/checklist 已存在并批准。当前 supervision 已开始迁移到 backend-neutral evidence ledger。"
acceptance:
