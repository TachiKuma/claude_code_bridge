objective: "继续 windows-rmux-native-backend epic 中的 windows-shell-log-builder，建立 Windows shell command builder、pipe/log command builder、stderr redirection 和默认 shell 诊断，并保持现有 tmux 行为不漂移。"
start_point: "feature design/checklist 已批准；现有 shell/log 语义仍分散在 tmux_respawn.py、tmux_logs.py、tmux_server_policy.py、backend.py 和 runtime_launch/tmux_panes.py。"
