name: CCBD Rmux Windows Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/rmux_windows_validation_matrix.py"
      - "scripts/rmux-windows-validation-runbook.ps1"
      - "test/test_rmux_windows_validation_matrix.py"
      - "test/test_rmux_windows_validation_scope_guard.py"
      - ".github/workflows/ccbd-rmux-windows-validation.yml"

permissions:
  contents: read

jobs:
  subset:
    name: Deterministic validation subset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Unit tests
        run: |
          python -m pytest -q \
            test/test_rmux_windows_validation_matrix.py \
            test/test_rmux_windows_validation_scope_guard.py

      - name: Build fake subset report
        run: |
          python scripts/rmux_windows_validation_matrix.py --lane fake --scope subset --json

      - name: Validate manifest
        run: |
          python scripts/rmux_windows_validation_matrix.py --validate-manifest --json

      - name: Scope guard
        run: |
          python scripts/rmux_windows_validation_matrix.py --scope-guard --diff-base "${{ github.event.pull_request.base.sha || 'HEAD' }}" --json
