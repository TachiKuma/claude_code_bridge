repos:
  - repo: local
    hooks:
      - id: ccb-protocol-strings
        name: ccb protocol string guard
        entry: python scripts/check_protocol_strings.py
        language: system
        pass_filenames: false
      - id: ccb-translation-coverage
        name: ccb translation coverage
        entry: python scripts/check_translation_coverage.py
        language: system
        pass_filenames: false
      - id: ccb-translation-completeness
        name: ccb translation completeness
        entry: python scripts/check_translation_completeness.py
        language: system
        pass_filenames: false
